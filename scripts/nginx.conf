# ============================================================
# /etc/nginx/sites-available/checkout
#
# Setup:
#   sudo cp /srv/shared/checkout-server/scripts/nginx.conf /etc/nginx/sites-available/checkout
#   sudo ln -s /etc/nginx/sites-available/checkout /etc/nginx/sites-enabled/checkout
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo certbot --nginx -d yourdomain.com -d crypto.yourdomain.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Architecture (both on same VPS):
#   yourdomain.com        → FastAPI checkout app (port 8000)
#   crypto.yourdomain.com → BTCPay Server Docker (port 23000)
# ============================================================


# ─── Redirect all HTTP → HTTPS ───────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com crypto.yourdomain.com;
    return 301 https://$host$request_uri;
}


# ─── CHECKOUT PAGE (yourdomain.com) ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # SSL — filled in by Certbot automatically
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/checkout_access.log;
    error_log  /var/log/nginx/checkout_error.log;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Static files — served directly by Nginx (faster, no Python overhead)
    location /static/ {
        alias /srv/shared/checkout-server/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Admin — restrict to your IP only
    location /admin/ {
        # Uncomment and set your real IP:
        # allow YOUR.IP.ADDRESS.HERE;
        # deny all;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # BTCPay webhooks — must be reachable by BTCPay (same server, internal)
    location /webhooks/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Main checkout app
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        gzip on;
        gzip_types text/html text/css application/javascript application/json;
        gzip_min_length 1024;
    }

    location ~ /\.  { deny all; }
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}


# ─── BTCPAY SERVER (crypto.yourdomain.com) ───────────────────────────────────
# Same VPS — BTCPay runs in Docker on port 23000
# Set up AFTER running: sudo bash scripts/install_btcpay.sh
server {
    listen 443 ssl http2;
    server_name crypto.yourdomain.com;

    # SSL — filled in by Certbot automatically
    # ssl_certificate     /etc/letsencrypt/live/crypto.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/crypto.yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/btcpay_access.log;
    error_log  /var/log/nginx/btcpay_error.log;

    # BTCPay needs WebSocket support for real-time updates
    location / {
        proxy_pass         http://127.0.0.1:23000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }
}
